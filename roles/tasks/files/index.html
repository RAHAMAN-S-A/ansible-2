<!DOCTYPE html>
<html>
<head>
    <title>My DevOps App</title>
    <style>
        body {
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        h1 {
            color: #00ffcc;
        }

        p {
            font-size: 20px;
        }

        .box {
            background: #2c2c3e;
            padding: 30px;

<body>

<div class="box">
    <h1>🚀 Welcome to My DevOps Project</h1>
    <p>This app is deployed using Ansible</p>
    <p>Server IP: {{ ansible_host }}</p>
    <p>Status: Running Successfully ✅</p>
</div>

</body>
</html>
